on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00 # v4.7.1
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build with Maven
        run: mvn clean package -B -DskipTests

      - name: Login al registry OpenShift
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OPENSHIFT_REGISTRY }}
          username: ${{ secrets.OPENSHIFT_USER }}
          password: ${{ secrets.OPENSHIFT_TOKEN }}

      - name: Build e Push Docker image
        run: |
          IMAGE=${{ secrets.OPENSHIFT_REGISTRY }}/${{ secrets.OPENSHIFT_NAMESPACE }}/hello-world:latest
          docker build -f Dockerfile -t $IMAGE .
          docker push $IMAGE

      - name: Deploy su OpenShift
        uses: redhat-actions/oc-login@v1
        with:
          openshift_server_url: ${{ secrets.OPENSHIFT_SERVER }}
          openshift_token: ${{ secrets.OPENSHIFT_TOKEN }}
          insecure_skip_tls_verify: true
          namespace: ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Apply manifests
        run: |
          oc apply -f deploy.yaml -n ${{ secrets.OPENSHIFT_NAMESPACE }}

      - name: Trigger rollout
        run: |
          oc rollout restart deployment/my-java-springboot -n ${{ secrets.OPENSHIFT_NAMESPACE }}
          oc rollout status deployment/my-java-springboot -n ${{ secrets.OPENSHIFT_NAMESPACE }}